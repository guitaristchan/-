<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>휘찬의 AI 포트폴리오</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: 'Pretendard', sans-serif; }
        
        /* 1. 배경 슬라이더 */
        .swiper { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }

        /* 2. 뮤직 플레이어 버튼 */
        #music-control {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px);
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 2px solid white; transition: 0.3s;
        }
        #music-control.playing { border-color: #007AFF; box-shadow: 0 0 15px #007AFF; }

        /* 3. 입력창 디자인 */
        #chat-container {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 999999999 !important; 
            display: flex; width: 85%; max-width: 450px;
            background: rgba(255, 255, 255, 0.95); padding: 10px 20px; border-radius: 50px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }
        
        #userInput { flex: 1; border: none; outline: none; font-size: 18px; padding: 5px 10px; background: transparent; color: #111; }
        #sendBtn { border: none; background: #007AFF; color: white; padding: 10px 22px; border-radius: 30px; cursor: pointer; font-weight: bold; }

        /* 4. 말풍선 위치 및 디자인 */
        .live2d-widget-dialog-container {
            position: fixed !important;
            right: 20px !important;
            bottom: 340px !important; 
            z-index: 999999 !important;
            opacity: 1 !important;
            pointer-events: none !important;
        }

        .live2d-widget-dialog {
            background: rgba(255, 255, 255, 0.95) !important;
            border: 3px solid #007AFF !important;
            border-radius: 40px !important; 
            padding: 20px 30px !important;
            font-size: 18px !important;
            font-weight: 700 !important;
            color: #111 !important;
            line-height: 1.4 !important;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2) !important;
            width: fit-content !important; 
            min-width: 120px !important;
            max-width: 320px !important;
            height: auto !important;
            text-align: center !important;
            display: block !important;
        }

        #live2d-widget { pointer-events: none !important; }
    </style>
</head>
<body>

    <audio id="bgm" src="오디오/White christmas.mp3" loop></audio>

    <div id="music-control">
        <span style="font-size: 24px; color: white;">🎵</span>
    </div>

    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="이미지/기타>jpg"></div>
            <div class="swiper-slide"><img src="이미지/바이올린.jpg"></div>
            <div class="swiper-slide"><img src="이미지/색소폰.jpg"></div>
        </div>
    </div>

    <div id="chat-container">
        <input type="text" id="userInput" placeholder="휘찬님에 대해 물어보세요!" autocomplete="off" />
        <button id="sendBtn">질문</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/live2d-widget@3.1.4/lib/L2Dwidget.min.js"></script>

    <script>
        // 1. 버튜버 초기화
        L2Dwidget.init({
            "model": { "jsonPath": "https://cdn.jsdelivr.net/gh/evrstr/live2d-widget-models/live2d_evrstr/koharu/model.json" },
            "display": { "position": "right", "width": 180, "height": 360, "hOffset": 10, "vOffset": 0 },
            "mobile": { "show": true },
            "dialog": { "enable": true }
        });

        // 2. 답변 출력 함수
        function botSay(text) {
            const dialogBox = document.querySelector('.live2d-widget-dialog');
            if (dialogBox) {
                dialogBox.innerHTML = text.replace(/\n/g, '<br>');
                dialogBox.style.opacity = 1;
            } else {
                setTimeout(() => botSay(text), 500);
            }
        }

        // 3. 음악 제어
        const bgm = document.getElementById('bgm');
        const musicBtn = document.getElementById('music-control');
        musicBtn.onclick = () => {
            if (bgm.paused) {
                bgm.play().catch(e => {
                    botSay("음원 파일을 찾을 수 없어요! 폴더와 파일명을 확인해 주세요.");
                });
                musicBtn.classList.add('playing');
                botSay("휘찬님이 연주하는 White christmas를 감상해 보세요! 🎄");
            } else {
                bgm.pause();
                musicBtn.classList.remove('playing');
            }
        };

        // 4. 휘찬님 데이터베이스
        const hwichanDB = {
            "이름": "윤휘찬님입니다. 서울대학교를 다니고 있어요 !",
            "생일": "12월 20일입니다. 축하해 주세요!",
            "나이": "02년생이시니까 현재 아주 열정 넘치는 시기이시군요!",
            "학교": "대한민국 최고의 서울대학교 음악대학에 재학 중입니다.",
            "단과대": "예술의 혼이 살아있는 음악대학 소속이십니다.",
            "학과": "기악과에서 클래식 기타를 전공하고 계십니다.",
            "악기": "섬세한 선율의 클래식 기타가 전공이세요.",
            "학번": "22학번입니다. 벌써 학교의 든든한 선배님이시죠.",
            "졸업": "본전공 졸업까지 이제 딱 5학점만 남으셨습니다!",
            "정보문화학과": "가고싶다.",
            "좋아하는 음식": "청포도입니다...!",
            "학생회": "사무국에서 일하고 있어요.",
            "꿈": "글쎄요..?",
            "사무국": "학생회의 행정과 살림을 도맡아 하는 핵심 부서입니다.",
            "제휴": "샤로수길 생선구이, 시티악기 등 굵직한 제휴를 성공시키셨습니다.",
            "야구": "미대 야구부에서 활약 중이며 야구를 정말 사랑하십니다.",
            "등번호": "휘찬님의 상징적인 야구 등번호는 4번입니다.",
            "조이": "사랑스러운 반려견 조이(포메라니안)와 함께 살고 계십니다.",
            "동생": "현재 입시를 준비하는 소중한 남동생을 챙기는 든든한 오빠입니다.",
            "기획": "음악, 기술, 감정을 융합하는 창의적인 기획이 특기이십니다.",
            "브랜딩": "기술로 감정을 브랜딩하는 전문가를 꿈꾸고 계십니다.",
            "휘찬": "바로 당신, 무궁무진한 가능성을 가진 빛나는 사람입니다!",
            "윤휘찬": "찬양해라 !! "
        };

        // 5. 질문 처리 함수 (유튜브 이동 기능 포함)
        function handleQuestion() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg) return;

            // 연주 영상 이동 로직 추가
            if (msg.includes("연주 영상") || msg.includes("유튜브")) {
                botSay("휘찬님의 멋진 연주 영상으로 안내해 드릴게요! 🎻");
                setTimeout(() => {
                    window.open("https://www.youtube.com/watch?v=2-aw2oZUpx8&list=RD2-aw2oZUpx8&start_radio=1", "_blank");
                }, 1500);
                input.value = "";
                return;
            }

            let reply = "그 단어는 아직 공부 중이에요! 다른 궁금한 게 있나요?";

            for (let key in hwichanDB) {
                if (msg.includes(key)) {
                    reply = hwichanDB[key];
                    break;
                }
            }

            botSay(reply);
            input.value = "";
        }

        document.getElementById('sendBtn').onclick = handleQuestion;
        document.getElementById('userInput').onkeydown = (e) => { if (e.key === 'Enter') handleQuestion(); };

        // 6. 슬라이더 설정
        new Swiper('.swiper', { 
            loop: true, 
            autoplay: { delay: 4000, disableOnInteraction: false },
            speed: 1000,
        });
    </script>
</body>
</html>
