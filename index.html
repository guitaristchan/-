    <style>

        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #fce4ec; /* 연분홍 배경 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            position: relative;
            width: 400px;
            text-align: center;
        }

        /* 말풍선 스타일 - 위치를 낮게 조정했습니다 */
        .bubble {
            position: relative;
            background: #ffffff;
            border: 3px solid #f06292;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px; /* 캐릭터와의 간격을 좁히기 위해 조정 */
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-size: 14px;
            line-height: 1.5;
            color: #444;
            /* 위치 조정: 아래쪽 여백을 줄여 캐릭터와 더 가깝게 만듦 */
            top: 10px; 
        }

        .bubble:after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            border-width: 15px 15px 0;
            border-style: solid;
            border-color: #ffffff transparent;
            display: block;
            width: 0;
            z-index: 1;
            margin-left: -15px;
        }

        .bubble:before {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            border-width: 17px 17px 0;
            border-style: solid;
            border-color: #f06292 transparent;
            display: block;
            width: 0;
            z-index: 0;
            margin-left: -17px;
        }

        /* 캐릭터 이미지 (예시) */
        .character {
            width: 200px;
            height: auto;
            margin-top: 15px;
        }

        /* 입력창 스타일 */
        .input-area {
            margin-top: 30px;
            display: flex;
            gap: 10px;
        }

        input {
            padding: 10px;
            border: 2px solid #f06292;
            border-radius: 10px;
            outline: none;
            flex-grow: 1;
        }

        button {
            padding: 10px 20px;
            background: #f06292;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #ec407a;
        }
    </style>
</head>
