<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>휘찬의 AI 포트폴리오</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        /* 배경 슬라이더 */
        .swiper { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }

        /* 입력창 영역 (z-index를 가장 높게 설정) */
        #chat-container {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            z-index: 999999999 !important; 
            display: flex; width: 90%; max-width: 400px;
            background: white; padding: 10px 15px; border-radius: 40px;
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
            pointer-events: auto !important;
        }
        
        #userInput { flex: 1; border: none; outline: none; font-size: 16px; padding: 5px 10px; background: transparent; }
        #sendBtn { border: none; background: #222; color: white; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; }

        /* 버튜버 말풍선 강제 표시 스타일 */
        .live2d-widget-dialog-container {
            pointer-events: none !important; /* 말풍선이 입력을 방해하지 않도록 함 */
            opacity: 1 !important;
        }
    </style>
</head>
<body>

    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="https://picsum.photos/id/10/1080/1920"></div>
            <div class="swiper-slide"><img src="https://picsum.photos/id/20/1080/1920"></div>
            <div class="swiper-slide"><img src="https://picsum.photos/id/30/1080/1920"></div>
        </div>
    </div>

    <div id="chat-container">
        <input type="text" id="userInput" placeholder="휘찬님 전공이 뭐야?" autocomplete="off" />
        <button id="sendBtn">질문</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/live2d-widget@3.1.4/lib/L2Dwidget.min.js"></script>

    <script>
        // 1. 버튜버 초기화
        L2Dwidget.init({
            "model": { "jsonPath": "https://cdn.jsdelivr.net/gh/evrstr/live2d-widget-models/live2d_evrstr/koharu/model.json" },
            "display": { "position": "right", "width": 150, "height": 300, "hOffset": 10, "vOffset": 0 },
            "mobile": { "show": true },
            "dialog": { "enable": true }
        });

        // 2. 메시지 표시 함수 직접 구현 (기존 showTextMessage 에러 해결법)
        function displayMessage(text) {
            const dialogBox = document.querySelector('.live2d-widget-dialog');
            if (dialogBox) {
                dialogBox.innerText = text;
                dialogBox.style.opacity = 1;
                // 5초 뒤에 사라지게 하려면 아래 코드 활성화
                // setTimeout(() => { dialogBox.style.opacity = 0; }, 5000);
            } else {
                // 아직 버튜버 로딩 전이라면 일반 알림으로 표시
                alert(text);
            }
        }

        // 3. 답변 로직
        function handleQuery() {
            const input = document.getElementById('userInput');
            const query = input.value.trim();
            if(!query) return;

            let reply = `'${query}'에 대해 궁금하시군요! 휘찬님은 정말 멋진 분이에요.`;

            if(query.includes("대학") || query.includes("학교") || query.includes("서울대")) {
                reply = "윤휘찬님은 서울대학교 음악대학에 재학 중입니다! 🎓";
            } else if(query.includes("전공") || query.includes("악기")) {
                reply = "현재 현악(Strings)을 전공하고 있어요! 🎻";
            } else if(query.includes("학생회") || query.includes("직책")) {
                reply = "음대 학생회 사무부국장으로 활동하고 계십니다! 💼";
            }

            displayMessage(reply);
            input.value = ""; 
        }

        // 4. 이벤트 연결
        window.onload = function() {
            document.getElementById('sendBtn').onclick = handleQuery;
            document.getElementById('userInput').onkeydown = function(e) {
                if (e.key === 'Enter') handleQuery();
            };
        };

        // 5. 슬라이더 설정
        const swiper = new Swiper('.swiper', { loop: true });
    </script>
</body>
</html>
