<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>휘찬의 AI 포트폴리오</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        /* 배경 슬라이더 */
        .swiper { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }

        /* 입력창 영역 (z-index를 극한으로 높임) */
        #chat-container {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 999999999 !important; 
            display: flex; width: 85%; max-width: 400px;
            background: white; padding: 10px 15px; border-radius: 40px;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            pointer-events: auto !important;
        }
        
        #userInput { flex: 1; border: none; outline: none; font-size: 16px; padding: 5px 10px; background: transparent; }
        #sendBtn { border: none; background: #000; color: white; padding: 10px 18px; border-radius: 30px; cursor: pointer; font-weight: bold; }

        /* 버튜버 설정 */
        #live2d-widget { pointer-events: none !important; }
        .live2d-widget-dialog-container { opacity: 1 !important; pointer-events: none !important; }
    </style>
</head>
<body>

    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="https://picsum.photos/id/101/1080/1920"></div>
            <div class="swiper-slide"><img src="https://picsum.photos/id/102/1080/1920"></div>
            <div class="swiper-slide"><img src="https://picsum.photos/id/103/1080/1920"></div>
        </div>
    </div>

    <div id="chat-container">
        <input type="text" id="userInput" placeholder="휘찬님 전공이 뭐야?" autocomplete="off" />
        <button id="sendBtn">질문</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/live2d-widget@3.1.4/lib/L2Dwidget.min.js"></script>

    <script>
        // 1. 버튜버 초기화
        L2Dwidget.init({
            "model": { "jsonPath": "https://cdn.jsdelivr.net/gh/evrstr/live2d-widget-models/live2d_evrstr/koharu/model.json" },
            "display": { "position": "right", "width": 150, "height": 300, "hOffset": 10, "vOffset": 0 },
            "mobile": { "show": true },
            "dialog": { "enable": true }
        });

        // 2. 말풍선 텍스트 강제 변경 함수 (핵심!)
        function botSay(text) {
            const dialogElement = document.querySelector('.live2d-widget-dialog');
            if (dialogElement) {
                dialogElement.innerText = text;
                dialogElement.style.opacity = 1;
            } else {
                // 아직 로딩 전이면 0.5초 뒤에 다시 시도
                setTimeout(() => botSay(text), 500);
            }
        }

        // 3. 질문 처리 로직
        function handleQuestion() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            if (!msg) return;

            let reply = `'${msg}'에 대해 궁금하시군요! 휘찬님은 아주 훌륭한 분입니다.`;

            if (msg.includes("대학") || msg.includes("학교") || msg.includes("서울대")) {
                reply = "윤휘찬님은 서울대학교 음악대학에 재학 중입니다! 🎓";
            } else if (msg.includes("전공") || msg.includes("악기") || msg.includes("현악")) {
                reply = "현재 기악과에서 현악을 전공하고 있어요! 🎻";
            } else if (msg.includes("학생회") || msg.includes("부국장")) {
                reply = "음대 학생회 사무부국장으로서 멋진 리더십을 보여주고 있죠! 💼";
            }

            botSay(reply);
            input.value = "";
        }

        // 4. 이벤트 연결 (엔터 & 클릭)
        document.getElementById('sendBtn').onclick = handleQuestion;
        document.getElementById('userInput').onkeydown = function(e) {
            if (e.key === 'Enter') handleQuestion();
        };

        // 5. 슬라이더 설정
        new Swiper('.swiper', { loop: true, autoplay: { delay: 4000 } });
    </script>
</body>
</html>
